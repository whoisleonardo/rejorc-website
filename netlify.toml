# Configuracao do deploy do frontend na Netlify.
# O site fica em frontend/; a API roda fora da Netlify (VITE_API_URL).

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://rejorc.147.15.26.90.sslip.io"

# SPA: toda rota cai no index.html (React Router cuida do resto)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
