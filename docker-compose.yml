services:
  backend:
    build: ./backend
    # Cria o .env a partir do .env.example na primeira subida (aparece em
    # backend/.env no seu disco — edite lá para trocar senha/segredo),
    # garante o usuário admin e o conteúdo inicial, e inicia a API.
    command: sh -c "[ -f .env ] || cp .env.example .env; npm run seed && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      # O código, o banco (data.sqlite) e os uploads ficam na pasta backend/
      # do seu disco, como sempre — o container só executa.
      - ./backend:/app
      # node_modules vive só dentro do container (better-sqlite3 é binário
      # nativo de Linux e não pode ser compartilhado com o macOS).
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
